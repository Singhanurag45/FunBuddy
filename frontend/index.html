<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/Logo.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="FunBuddy is a playful learning platform with mission-based quizzes, AI hints, and live progress analytics."
    />
    <link rel="preload" href="/src/index.css" as="style" />
    <link rel="modulepreload" href="/src/main.tsx" />
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        color: #17324d;
        background:
          radial-gradient(circle at top left, rgba(102, 217, 184, 0.22), transparent 32%),
          radial-gradient(circle at top right, rgba(37, 99, 255, 0.2), transparent 38%),
          linear-gradient(180deg, #f8fbff 0%, #f3f8ff 52%, #eef5ff 100%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      .app-shell {
        margin: 0 auto;
        max-width: 1280px;
        padding: 1rem;
      }

      .shell-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 2rem;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05);
        backdrop-filter: blur(20px);
        padding: 0.9rem 1.25rem;
      }

      .shell-brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .shell-logo {
        display: flex;
        height: 2.5rem;
        width: 2.5rem;
        align-items: center;
        justify-content: center;
        border-radius: 1rem;
        background: #2563ff;
        box-shadow: 0 10px 30px rgba(37, 99, 255, 0.2);
      }

      .shell-logo img {
        width: 1.4rem;
        height: 1.4rem;
      }

      .shell-eyebrow {
        font-size: 0.65rem;
        font-weight: 800;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(37, 99, 255, 0.72);
      }

      .shell-title {
        font-size: 1.1rem;
        font-weight: 900;
        color: #0f172a;
      }

      .shell-actions {
        display: flex;
        gap: 0.75rem;
        font-weight: 800;
        color: #64748b;
      }

      .shell-hero {
        padding: 4rem 1rem 5rem;
        text-align: center;
      }

      .shell-badge {
        display: inline-block;
        border: 1px solid rgba(37, 99, 255, 0.2);
        border-radius: 999px;
        background: rgba(37, 99, 255, 0.1);
        color: #2563ff;
        padding: 0.65rem 1rem;
        font-size: 0.75rem;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .shell-hero h1 {
        margin: 1rem auto 0;
        max-width: 56rem;
        font-size: clamp(2.4rem, 7vw, 4.5rem);
        line-height: 1.05;
        letter-spacing: -0.04em;
        color: #0f172a;
      }

      .shell-hero p {
        margin: 1.5rem auto 0;
        max-width: 46rem;
        font-size: clamp(1rem, 2.2vw, 1.25rem);
        font-weight: 700;
        line-height: 1.8;
        color: #5c718a;
      }
    </style>
    <title>FunBuddy</title>
  </head>
  <body>
    <div id="root">
      <div class="app-shell">
        <div class="shell-nav">
          <div class="shell-brand">
            <div class="shell-logo">
              <img src="/Logo.webp" alt="FunBuddy" />
            </div>
            <div>
              <div class="shell-title">FunBuddy</div>
              <div class="shell-eyebrow">Gamified Learning</div>
            </div>
          </div>
          <div class="shell-actions">
            <span>Login</span>
            <span>Register</span>
          </div>
        </div>
        <div class="shell-hero">
          <div class="shell-badge">Learn Faster With FunBuddy</div>
          <h1>Gamified Learning That Turns Every Lesson Into A Winning Mission</h1>
          <p>
            FunBuddy brings high-energy quizzes, AI coaching, and live progress insights together so students stay curious, confident, and consistent.
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
