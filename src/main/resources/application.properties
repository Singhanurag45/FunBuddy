spring.application.name=gamify-learning-platform

# Optional: spring.profiles.active=dev (see application-dev.properties for Postman-friendly errors).

# Load .env values (e.g., DATABASE_URL) as Spring properties in local development.
spring.config.import=optional:file:.env[.properties]

# MongoDB Atlas configuration
# Set DATABASE_URL in your environment to keep credentials out of source code.
spring.data.mongodb.uri=${DATABASE_URL}

# JWT configuration
jwt.secret=${JWT_SECRET:gamify-learning-platform-jwt-secret-key-1234567890}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
